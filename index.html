<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveConnect - Private Room</title>
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iIzEwYjk4MSIvPjwvc3ZnPg==">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; overflow-x: hidden; user-select: none; -webkit-touch-callout: none; color: #fff; padding-bottom: 90px;}
        
        .glass { background: rgba(15, 15, 20, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glitch-text { animation: glitch 2s linear infinite; }
        @keyframes glitch { 2%, 64% { transform: translate(2px,0) skew(0deg); } 4%, 60% { transform: translate(-2px,0) skew(0deg); } 62% { transform: translate(0,0) skew(5deg); } }
        
        .radar-ping { position: absolute; inset: 0; border-radius: 50%; border: 2px solid #10b981; animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }

        .toast-enter { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .terminal { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: #10b981; opacity: 0.7; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="fixed top-0 left-0 w-full z-50 glass px-3 py-1.5 flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-2">
            <div class="relative w-8 h-8">
                <img src="https://ui-avatars.com/api/?name=Guest&background=random&color=fff" class="w-full h-full rounded-full border border-emerald-500">
                <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 rounded-full border border-black animate-pulse"></div>
            </div>
            <div>
                <p class="text-[9px] text-zinc-400">Account ID: <span id="autoId" class="text-white font-bold">G-0000</span></p>
                <p class="text-[10px] font-bold text-red-500 glitch-text">Verification Pending ⚠️</p>
            </div>
        </div>
        <div class="terminal text-right leading-tight">
            <div id="sysLog1">Securing connection...</div>
            <div id="sysLog2">Routing P2P via proxy</div>
            <div class="text-white mt-1 font-sans text-[10px] bg-red-600/20 px-1 rounded border border-red-500/50 blink-warn" style="display:none;" id="batteryWarn">
                <i class="fas fa-battery-quarter"></i> Low Battery! Verify fast.
            </div>
        </div>
    </div>

    <div class="fixed top-14 right-3 z-40 flex flex-col items-end gap-1 pointer-events-none">
        <div class="bg-black/80 px-2 py-1 rounded text-[10px] border border-white/10 flex items-center gap-1 shadow-lg shadow-emerald-500/20">
            <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-ping"></span>
            <span id="liveViewers" class="font-mono font-bold text-emerald-400">142</span> looking now
        </div>
        <div class="bg-black/80 px-2 py-1 rounded text-[9px] border border-white/10 text-zinc-400">
            <i class="fas fa-location-arrow text-blue-400"></i> Local search active
        </div>
    </div>

    <main class="pt-16 pb-20 px-2 max-w-md mx-auto relative z-10" id="mainContent">
        <div class="grid grid-cols-2 gap-2" id="gridArea"></div>
        
        <div class="mt-6 text-center">
            <button onclick="fireRedirect()" class="w-full py-3 rounded-full bg-zinc-900 border border-emerald-500/30 text-emerald-500 font-bold text-xs animate-pulse">
                <i class="fas fa-sync-alt mr-1"></i> Load More Locals
            </button>
        </div>
    </main>

    <div id="callScreen" class="fixed inset-0 bg-black/95 z-[9999] flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-xl">
        <div class="absolute top-10 text-center">
            <p class="text-emerald-500 text-sm font-mono mb-1"><i class="fas fa-lock"></i> End-to-End Encrypted</p>
            <p class="text-white text-xl font-bold tracking-widest glitch-text">INCOMING CAM CALL</p>
        </div>
        
        <div class="relative w-40 h-40 mt-10 mb-8">
            <div class="radar-ping"></div>
            <div class="radar-ping" style="animation-delay: 1s;"></div>
            <img id="callerImage" src="" class="w-full h-full rounded-full object-cover border-4 border-emerald-500 shadow-[0_0_50px_rgba(16,185,129,0.6)] relative z-10">
        </div>
        
        <h2 class="text-4xl font-black text-white mb-2" id="callerName">Chloe, 21</h2>
        <p class="text-zinc-400 text-sm mb-12">"I am waiting... please pick up! 💦"</p>

        <div class="flex gap-10">
            <button onclick="handleReject()" class="w-16 h-16 rounded-full bg-red-600 flex justify-center items-center text-white text-2xl shadow-[0_0_30px_rgba(220,38,38,0.5)] active:scale-90 transition">
                <i class="fas fa-phone-slash"></i>
            </button>
            <button onclick="fireRedirect()" class="w-16 h-16 rounded-full bg-emerald-500 flex justify-center items-center text-white text-2xl shadow-[0_0_30px_rgba(16,185,129,0.8)] active:scale-90 transition animate-bounce">
                <i class="fas fa-video"></i>
            </button>
        </div>
    </div>

    <div id="chatInterface" class="fixed inset-x-0 bottom-0 top-[40%] bg-zinc-900 z-[9995] rounded-t-3xl shadow-[0_-20px_50px_rgba(0,0,0,0.8)] transform translate-y-full transition-transform duration-500 border-t border-emerald-500/30 flex flex-col">
        <div class="flex items-center gap-3 p-4 border-b border-zinc-800 bg-zinc-900/90 rounded-t-3xl">
            <img id="chatImage" src="" class="w-10 h-10 rounded-full object-cover">
            <div class="flex-1">
                <h3 class="text-white font-bold text-sm"><span id="chatName">Chloe</span> <i class="fas fa-check-circle text-blue-500 text-[10px]"></i></h3>
                <p id="chatStatus" class="text-emerald-500 text-[10px] font-mono">typing...</p>
            </div>
            <button onclick="fireRedirect()" class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs font-bold border border-emerald-500/50 animate-pulse">Call Back</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-3" id="messageArea" onclick="fireRedirect()">
            </div>
        <div class="p-3 bg-black cursor-pointer" onclick="fireRedirect()">
            <div class="w-full bg-zinc-800 rounded-full py-3 px-4 text-xs text-zinc-500 flex justify-between items-center border border-zinc-700">
                <span>Type a message...</span>
                <i class="fas fa-paper-plane text-emerald-500"></i>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-24 left-2 right-2 z-40 pointer-events-none flex flex-col gap-2"></div>

    <script>
        const OFFER_LINK = "https://bedjfha.litracksm.com/s/62b4abc4a39b9?preland=Adult";
        let clicked = false;

        // User provided Image DB
        const imageDB = [
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/zUhgoTkN_400x400.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/Edtlj7HUcAERuPf.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/C2CDnINUsAArk4M.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/918ef2fd-89ae-4629-97c1-46aed0bcf444.webp?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/8cd9b917-2a23-4f57-84a3-bf06bc59ff04.webp?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/22.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/15.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/post94873717708903160IMG_2631.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/photo_2026-02-01_19-40-54.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faff59e27102.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafd6212320b.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafcae692d2c.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafc930da7d6.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafbe3fc1960.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafb9e5a7fc5.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafb12fc3117.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faf934c26dee.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faf445819aa1.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faf376edf756.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faf17e56f793.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faf12db448e5.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faeff2b47920.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faee27525158.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faece2309a62.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faead4ae3571.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fae8e424e078.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images4.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images%201.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/ZUQYQVFNR3-thumb.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/Z5CJD4WFFK.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/WZT9ONOAVQ.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/T4APYLQ1UD.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/QYVIU1LTLK-thumb.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/GsKNHUXXsAA_z4C.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/HE7LupIXEAA2xnS.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/EhU-uxVU4AEV_-n.jpg?raw=true"
        ];

        const fakeNames = ["Chloe", "Mia", "Lily", "Zoe", "Emma", "Ava", "Isabella", "Sophia", "Riley", "Aria", "Scarlett", "Layla"];

        // Helper to get random item
        const getRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
        // Shuffle array safely
        const shuffledImages = [...imageDB].sort(() => 0.5 - Math.random());

        // 1. Initial Setup
        document.getElementById('autoId').innerText = "G-" + Math.floor(1000 + Math.random() * 9000);
        
        // 2. Fake Terminal Logs Loop
        const logs = ["Bypassing firewalls...", "Matching algorithm active", "Locating nearest users", "Decrypting stream...", "Connecting to cam servers..."];
        setInterval(() => {
            document.getElementById('sysLog1').innerText = document.getElementById('sysLog2').innerText;
            document.getElementById('sysLog2').innerText = logs[Math.floor(Math.random() * logs.length)];
        }, 1500);

        // 3. Battery Trick
        setTimeout(() => { document.getElementById('batteryWarn').style.display = 'block'; }, 8000);

        // 4. Populate Grid dynamically with 8 random images from your list
        for(let i=0; i<8; i++) {
            let initialDist = (Math.random() * 3 + 1).toFixed(2);
            let age = Math.floor(Math.random() * 8) + 18;
            let name = fakeNames[i % fakeNames.length];
            
            document.getElementById('gridArea').innerHTML += `
                <div class="relative rounded-xl overflow-hidden glass aspect-[3/4] active:scale-95 transition" onclick="fireRedirect()">
                    <img src="${shuffledImages[i]}" loading="lazy" class="w-full h-full object-cover opacity-90">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                    <div class="absolute top-2 left-2 flex gap-1">
                        <span class="bg-red-500 text-white text-[8px] font-bold px-1.5 py-0.5 rounded shadow">LIVE</span>
                    </div>
                    <div class="absolute bottom-2 left-2">
                        <h4 class="font-bold text-sm text-white">${name}, ${age} <span class="w-2 h-2 bg-emerald-500 rounded-full inline-block"></span></h4>
                        <p class="text-[9px] text-zinc-300 font-mono"><i class="fas fa-location-crosshairs text-emerald-400"></i> <span id="dist-${i}">${initialDist}</span> km</p>
                    </div>
                </div>
            `;
        }

        // Setup Main Caller (using the 9th image in shuffled array or a random one)
        const mainCallerImg = shuffledImages[8] || shuffledImages[0];
        const mainCallerName = getRandom(fakeNames);
        document.getElementById('callerImage').src = mainCallerImg;
        document.getElementById('chatImage').src = mainCallerImg;
        document.getElementById('callerName').innerText = `${mainCallerName}, 21`;
        document.getElementById('chatName').innerText = mainCallerName;

        // 5. Dynamic Distance Dropper
        setInterval(() => {
            for(let i=0; i<8; i++) {
                let el = document.getElementById(`dist-${i}`);
                if(el) {
                    let val = parseFloat(el.innerText);
                    if(val > 0.1) el.innerText = (val - 0.05).toFixed(2);
                }
            }
        }, 3000);

        // 6. Viewers fluctuator
        setInterval(() => {
            let v = parseInt(document.getElementById('liveViewers').innerText);
            document.getElementById('liveViewers').innerText = v + (Math.floor(Math.random() * 7) - 3);
        }, 2000);

        // 7. Continuous Toast Notifications
        const toastNames = ["User492", "Guest_91", "AlphaWolf", "LonelyGuy99", "Mark_T"];
        const toastActions = ["just verified account! 🔒", "started a private cam show 🎥", "sent a gift 🎁", "upgraded to Premium 💎"];
        
        setInterval(() => {
            if(clicked) return;
            let t = document.createElement('div');
            t.className = "bg-zinc-900/90 border border-zinc-700 p-2 rounded-lg text-[10px] text-zinc-300 shadow-lg flex items-center gap-2 toast-enter backdrop-blur-md";
            t.innerHTML = `<i class="fas fa-info-circle text-emerald-500"></i> <b>${getRandom(toastNames)}</b> ${getRandom(toastActions)}`;
            
            let tc = document.getElementById('toastContainer');
            tc.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(()=>t.remove(), 500); }, 3000);
        }, 5500);

        // 8. Trigger Call Screen
        setTimeout(() => {
            if(clicked) return;
            document.getElementById('callScreen').classList.remove('opacity-0', 'pointer-events-none');
            if(navigator.vibrate) navigator.vibrate([1000, 500, 1000, 500, 1000]);
        }, 4000);

        // 9. Handle Reject & Trigger Aggressive Chat
        function handleReject() {
            if(navigator.vibrate) navigator.vibrate([100]);
            document.getElementById('callScreen').classList.add('opacity-0', 'pointer-events-none');
            
            let chat = document.getElementById('chatInterface');
            chat.style.transform = 'translateY(0)';
            
            let area = document.getElementById('messageArea');
            let status = document.getElementById('chatStatus');

            let seq = [
                { t: 1000, m: "Hey! Why did you disconnect? 😢" },
                { t: 2500, m: "I was getting undressed for you... 👙" },
                { t: 4000, m: "It says your profile isn't verified yet." },
                { t: 5500, m: "<div class='bg-emerald-500/10 border border-emerald-500/50 p-2 rounded text-emerald-400 font-bold text-center cursor-pointer' onclick='fireRedirect()'>Click Here to Verify So I Can Call You Back! 🔐</div>" }
            ];

            let delay = 0;
            seq.forEach(step => {
                delay += step.t;
                setTimeout(() => {
                    status.innerText = "typing...";
                    setTimeout(() => {
                        status.innerText = "Online";
                        let msg = document.createElement('div');
                        msg.className = "bg-zinc-800 p-3 rounded-2xl rounded-tl-sm text-sm text-zinc-100 max-w-[85%] border border-zinc-700/50 shadow-sm";
                        msg.innerHTML = step.m;
                        area.appendChild(msg);
                        area.scrollTop = area.scrollHeight;
                        if(navigator.vibrate) navigator.vibrate(50);
                    }, 800);
                }, delay - 800);
            });
        }

        // 10. Master Redirect
        function fireRedirect() {
            if(clicked) return;
            clicked = true;
            if(navigator.vibrate) navigator.vibrate([50, 50]);
            
            let flash = document.createElement('div');
            flash.className = "fixed inset-0 bg-emerald-500 z-[999999] transition-opacity duration-200";
            document.body.appendChild(flash);
            
            setTimeout(() => {
                flash.innerHTML = `<div class="w-full h-full flex flex-col items-center justify-center bg-black"><div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div><p class="text-emerald-400 font-mono text-sm tracking-widest">CONNECTING TO SECURE SERVER...</p></div>`;
            }, 100);

            setTimeout(() => { window.location.replace(OFFER_LINK); }, 800);
        }
    </script>
</body>
</html>
